name: Playwright E2E Tests

on:
  # Run on every push / PR to the main branch
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

  # Nightly scheduled run — catches environment drift and external dependency issues
  # Runs at 02:00 UTC every day
  schedule:
    - cron: '0 2 * * *'

  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project to run (leave empty for all)'
        required: false
        default: ''
      grep:
        description: 'Test tag filter (e.g. @smoke)'
        required: false
        default: ''

jobs:
  # ── Static analysis ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ── E2E tests ───────────────────────────────────────────────────────────────
  test:
    name: E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60

    strategy:
      # Keep running other browsers even if one fails
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run Playwright tests (${{ matrix.project }})
        run: |
          ARGS="--project=${{ matrix.project }}"
          if [ -n "${{ github.event.inputs.grep }}" ]; then
            ARGS="$ARGS --grep '${{ github.event.inputs.grep }}'"
          fi
          npx playwright test $ARGS
        env:
          # secrets.BASE_URL overrides when set; falls back to amazon.in
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.amazon.in' }}
          CI: true

      - name: Upload HTML report (${{ matrix.project }})
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results on failure (${{ matrix.project }})
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7
